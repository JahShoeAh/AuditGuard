version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auditguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: auditguard
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ${SCHEMA_FILE:-./orchestrator/src/schema.sql}:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditguard -d auditguard"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-/opt/auditguard/.env}
    environment:
      DATABASE_URL: postgresql://auditguard:${POSTGRES_PASSWORD}@postgres:5432/auditguard
      EVENTS_DB_PATH: /app/data/events.db
    volumes:
      - events_data:/app/data
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  events_data:
