version: '3.9'

networks:
  auditguard:
    driver: bridge

volumes:
  pg_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auditguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: auditguard
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./orchestrator/src/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditguard -d auditguard"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - auditguard

  events-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: node packages/events-api/src/index.js
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://auditguard:${POSTGRES_PASSWORD:-dev}@postgres:5432/auditguard
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - auditguard

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: node orchestrator/src/index.js
    env_file: .env
    environment:
      - ALLOW_SHARED_PAYER=true
      - EVENTS_API_URL=http://events-api:3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://auditguard:${POSTGRES_PASSWORD:-dev}@postgres:5432/auditguard
    depends_on:
      events-api:
        condition: service_healthy
    networks:
      - auditguard

  agents:
    build:
      context: .
      dockerfile: Dockerfile
    command: node -e "require('./agents/run-all.ts')"
    env_file: .env
    environment:
      - ALLOW_SHARED_PAYER=true
      - EVENTS_API_URL=http://events-api:3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://auditguard:${POSTGRES_PASSWORD:-dev}@postgres:5432/auditguard
    depends_on:
      events-api:
        condition: service_healthy
    networks:
      - auditguard

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      args:
        VITE_EVENTS_API_URL: ${VITE_EVENTS_API_URL:-http://localhost:3001}
    ports:
      - "5173:80"
    networks:
      - auditguard
