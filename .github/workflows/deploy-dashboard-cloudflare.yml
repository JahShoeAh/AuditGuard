name: Deploy Dashboard to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - "packages/dashboard/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-dashboard-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Build dashboard
        run: npm --prefix packages/dashboard run build

      - name: Deploy dashboard via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm --prefix packages/dashboard run deploy:cf
