name: Deploy Backend to EC2

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy — e.g. sha-abc1234def5 or latest"
        required: true
        default: latest

permissions:
  contents: read

jobs:
  deploy-to-ec2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute full image reference
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}-devall:${{ inputs.image_tag }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Upload docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "docker-compose.prod.yml"
          target: "/tmp/"
          overwrite: true

      - name: Upload EC2 deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "scripts/ec2/run-devall-container.sh"
          target: "/tmp/"
          strip_components: 2
          overwrite: true

      - name: Upload PostgreSQL schema
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "orchestrator/src/schema.sql"
          target: "/tmp/"
          strip_components: 2
          overwrite: true

      - name: Deploy image on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE="${{ steps.vars.outputs.image }}"
            ENV_FILE="${{ secrets.EC2_ENV_FILE }}"
            GHCR_USER="${{ secrets.GHCR_USERNAME }}"
            GHCR_PAT="${{ secrets.GHCR_READ_TOKEN }}"
            DEPLOY_DIR="${HOME}/auditguard-deploy"

            if [ -z "${ENV_FILE}" ]; then
              ENV_FILE="/opt/auditguard/.env"
            fi
            if [ ! -f "${ENV_FILE}" ]; then
              echo "Missing env file at ${ENV_FILE}" >&2
              exit 1
            fi

            mkdir -p "${DEPLOY_DIR}"
            cp /tmp/docker-compose.prod.yml "${DEPLOY_DIR}/docker-compose.prod.yml"
            cp /tmp/run-devall-container.sh "${DEPLOY_DIR}/run-devall-container.sh"
            cp /tmp/schema.sql "${DEPLOY_DIR}/schema.sql"
            chmod +x "${DEPLOY_DIR}/run-devall-container.sh"

            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            IMAGE="${IMAGE}" \
            ENV_FILE="${ENV_FILE}" \
            COMPOSE_FILE="${DEPLOY_DIR}/docker-compose.prod.yml" \
            SCHEMA_FILE="${DEPLOY_DIR}/schema.sql" \
            LEGACY_CONTAINER_NAME="${{ secrets.EC2_CONTAINER_NAME }}" \
            "${DEPLOY_DIR}/run-devall-container.sh"
