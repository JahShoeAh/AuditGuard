name: Deploy Dashboard to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "packages/dashboard/**"
      - "packages/sdk/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dashboard dependencies only
        run: npm ci -w packages/dashboard --include-workspace-root

      - name: Fix rollup platform binary
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build dashboard
        run: npm --prefix packages/dashboard run build
        env:
          VITE_EVENTS_API_BASE_URL: ${{ secrets.VITE_EVENTS_API_BASE_URL }}
          VITE_HEDERA_NETWORK: testnet
          VITE_HEDERA_JSON_RPC: https://testnet.hashio.io/api
          VITE_HEDERA_MIRROR_NODE: https://testnet.mirrornode.hedera.com

      - name: Create Vercel Build Output
        run: |
          mkdir -p packages/dashboard/.vercel/output/static
          cp -r packages/dashboard/dist/* packages/dashboard/.vercel/output/static/
          echo '{"version":3,"routes":[{"src":"/api/(.*)","dest":"http://${{ secrets.EC2_HOST }}:4000/api/$1"},{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > packages/dashboard/.vercel/output/config.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
